<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="body">
        <!-- Navbar -->
        <div class="navbar">
            <div class="navbar-title">
                Finance Dashboard
            </div>
            <div class="role-dropdown">
                <select class="role">
                    <option value="Viewer">Viewer</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
        </div>
        <div class="body-content">
            <!-- Summary Cards -->
            <div class="summary-cards">


                <div class="balance summary-card">
                    <div class="balance-title card-heading">
                        Total Balance
                    </div>
                    <div class="balance-value value">
                        ₹4000
                    </div>
                </div>

                <div class="income summary-card">
                    <div class="income-title card-heading">
                        Income
                    </div>
                    <div class="income-value value">
                        ₹40000
                    </div>
                </div>

                <div class="expenses summary-card">
                    <div class="expenses-title card-heading">
                        Expenses
                    </div>
                    <div class="expenses-value value">
                        ₹22000
                    </div>
                </div>
            </div>


            <!-- Charts -->
            <div class="charts">
                <div class="category-chart chart">
                    <div class="category-heading">Category Charts</div>
                    <div class="category-container">
                   <div class="food-category">
                    <div class="food-title category-title">Food</div>
                    <div class="food-bar bar"></div>
                    <span class="category-amount">₹4000</span>
                   </div>
                   <div class="travel-category">
                    <div class="travel-title category-title">Travel</div>
                    <div class="travel-bar bar"></div>
                    <span class="category-amount">₹6000</span>

                   </div>
                   <div class="shopping-category">
                    <div class="shopping-title category-title">Shopping</div>
                    <div class="shopping-bar bar"></div>
                    <span class="category-amount">₹10000</span>

                   </div>
                   </div>
                </div>
                <div class="trend-chart chart">
                   <div class="trend-heading">Monthly Trends</div>
                   <div class="trend-info">

                   <div class="jan trend">
                    <div class="trend-amount">₹10000</div>
                    <div class="jan-trendBar trendBar"></div>
                    <div class="trend-month">Jan</div>
                   </div>

                   <div class="feb trend">
                    <div class="trend-amount">₹30000</div>
                    <div class="feb-trendBar trendBar"></div>
                    <div class="trend-month">Feb</div>
                   </div>
                   <div class="mar trend">
                    <div class="trend-amount">₹45000</div>
                    <div class="mar-trendBar trendBar"></div>
                    <div class="trend-month">Mar</div>
                   </div>
                   <div class="apr trend">
                    <div class="trend-amount">₹30000</div>
                    <div class="apr-trendBar trendBar"></div>
                    <div class="trend-month">Apr</div>
                   </div>
                   <div class="may trend">
                    <div class="trend-amount">₹60000</div>
                    <div class="may-trendBar trendBar"></div>
                    <div class="trend-month">May</div>
                   </div>
                   <div class="jun trend">
                    <div class="trend-amount">₹60000</div>
                    <div class="jun-trendBar trendBar"></div>
                    <div class="trend-month">Jun</div>
                   </div>
                   </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
